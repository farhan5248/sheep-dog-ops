# Step 3b: provisioning loop enabled — sidecar watches ConfigMaps with
# `grafana_dashboard` / `grafana_datasource` labels and hot-loads them.
# Still no plugins. Infinity + KensoBI land in 3d / 3e.

grafana:
  service:
    type: ClusterIP

  persistence:
    enabled: false

  # Sidecar provisioning — picks up any ConfigMap in the release namespace
  # carrying the right label. Our chart contributes one of each as a smoke test;
  # later steps add real datasources (3d) and dashboards (3e) via the same path.
  sidecar:
    datasources:
      enabled: true
      label: grafana_datasource
      labelValue: "1"
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      folder: /tmp/dashboards
      provider:
        foldersFromFilesStructure: true
