# QA environment overrides for the sheep-dog umbrella chart.
# Deploy with:
#   helm upgrade --install sheep-dog <chart-path> -n qa --create-namespace \
#     -f helm-values/values-qa.yaml

ingress:
  host: qa.sheepdog.io

# GraphWalker Studio runs in qa (default-off elsewhere) on its own host (#454).
graphwalkerUi:
  enabled: true
  host: studio.sheepdog.io
