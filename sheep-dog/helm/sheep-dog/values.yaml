# Default values for the sheep-dog umbrella chart.
# Override per environment via helm-values/values-<env>.yaml and with --set.

# Image coordinates. One block per service so individual mvn builds can override
# just their own image tag via --set images.<svc>.tag=<version>.
images:
  amq:
    repository: apache/activemq-artemis
    tag: "2.41.0"
    pullPolicy: IfNotPresent
  asciidocApi:
    repository: nexus-docker.sheepdog.io/sheep-dog-asciidoc-api-svc
    tag: "1.36"
    pullPolicy: Always
  cucumberGen:
    repository: nexus-docker.sheepdog.io/sheep-dog-cucumber-gen-svc
    tag: "1.34"
    pullPolicy: Always
  graphmlApi:
    repository: nexus-docker.sheepdog.io/sheep-dog-graphml-api-svc
    tag: "1.6"
    pullPolicy: Always
  mcp:
    repository: nexus-docker.sheepdog.io/sheep-dog-mcp-svc
    tag: "1.31"
    pullPolicy: Always
  graphwalkerSvc:
    repository: nexus-docker.sheepdog.io/graphwalker-svc
    tag: "1.0-SNAPSHOT"
    pullPolicy: Always

# Ingress host for the sheep-dog ingress.
# Set on dev/qa (local minikube with hosts file entries). Leave empty on prod
# (AWS EKS) so the ingress matches any host header — the workflow talks directly
# to the AWS ELB hostname, not prod.sheepdog.io.
ingress:
  host: ""

# PVC storage class applied to all PVCs (asciidoc-api logs, cucumber-gen logs,
# shared repo). "standard" for minikube, "gp2" for AWS EKS.
pvcStorageClass: standard

# Per-service enable toggles (#456). Flip a service off in a values-<ns>.yaml to
# scale the stack down for a memory-constrained namespace (e.g. dev on the 8 GB
# sandbox node). Defaults are all-on so existing deploys are unchanged.
#
# Dependency closure — enabling a service requires its deps to be enabled too:
#   graphmlApi / asciidocApi  -> (amq + repo, both derived below)
#   cucumberGen               -> asciidocApi (+ amq + repo)
#   mcp                       -> asciidocApi + cucumberGen (+ amq; mcp needs no repo)
#   graphmlApi                -> graphwalker-svc (graphml-to-graphwalker, #475)
# amq, graphwalker-svc, and the shared repo PVC are NOT toggled directly: amq + repo
# render iff any of asciidocApi/cucumberGen/graphmlApi is enabled; graphwalker-svc
# renders iff graphmlApi is enabled (its only consumer).

# PVC sizes + enable flag per component
asciidocApi:
  enabled: true
  pvcSize: 1Gi
cucumberGen:
  enabled: true
  pvcSize: 1Gi
graphmlApi:
  enabled: true
  pvcSize: 1Gi
  # graphml-api-svc pushes the graphml model to git (sheep-dog-main#503), reusing the
  # same out-of-band GitHub token Secret as graphwalker-svc — only the name/key live here.
  githubSecretName: graphwalker-github
  githubSecretKey: token
mcp:
  enabled: true
# GraphWalker path/model service (sheep-dog-main#475). Co-deployed with graphml-api
# (its only consumer) the way amq is co-deployed, so graphml-to-graphwalker reaches it
# in-cluster at http://graphwalker-svc:80 instead of the api.graphwalker.io ingress.
# The GitHub token Secret is created out-of-band (kubectl create secret generic
# graphwalker-github --from-literal=token=<PAT>); only the name/key live in git.
graphwalkerSvc:
  githubSecretName: graphwalker-github
  githubSecretKey: token
# Shared repo volume mounted by both asciidoc-api-svc and cucumber-gen-svc
# at /repo. Bridges the cross-service file-store dependency previously served
# by the shared MySQL DB (#388). RWO works on single-node minikube because
# both pods land on the same node; multi-node will need RWX.
repo:
  pvcSize: 1Gi
