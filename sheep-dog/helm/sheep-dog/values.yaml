# Default values for the sheep-dog umbrella chart.
# Override per environment via helm-values/values-<env>.yaml and with --set.

# Image coordinates. One block per service so individual mvn builds can override
# just their own image tag via --set images.<svc>.tag=<version>.
images:
  amq:
    repository: apache/activemq-artemis
    tag: "2.41.0"
    pullPolicy: IfNotPresent
  asciidocApi:
    repository: nexus-docker.sheepdog.io/sheep-dog-asciidoc-api-svc
    tag: "1.31"
    pullPolicy: Always
  cucumberGen:
    repository: nexus-docker.sheepdog.io/sheep-dog-cucumber-gen-svc
    tag: "1.29"
    pullPolicy: Always
  graphmlApi:
    repository: nexus-docker.sheepdog.io/sheep-dog-graphml-api-svc
    tag: "1.0-SNAPSHOT"
    pullPolicy: Always
  mcp:
    repository: nexus-docker.sheepdog.io/sheep-dog-mcp-svc
    tag: "1.27"
    pullPolicy: Always

# Ingress host for the sheep-dog ingress.
# Set on dev/qa (local minikube with hosts file entries). Leave empty on prod
# (AWS EKS) so the ingress matches any host header — the workflow talks directly
# to the AWS ELB hostname, not prod.sheepdog.io.
ingress:
  host: ""

# PVC storage class applied to all PVCs (asciidoc-api logs, cucumber-gen logs,
# shared repo). "standard" for minikube, "gp2" for AWS EKS.
pvcStorageClass: standard

# PVC sizes per component
asciidocApi:
  pvcSize: 1Gi
cucumberGen:
  pvcSize: 1Gi
graphmlApi:
  pvcSize: 1Gi
# Shared repo volume mounted by both asciidoc-api-svc and cucumber-gen-svc
# at /repo. Bridges the cross-service file-store dependency previously served
# by the shared MySQL DB (#388). RWO works on single-node minikube because
# both pods land on the same node; multi-node will need RWX.
repo:
  pvcSize: 1Gi
