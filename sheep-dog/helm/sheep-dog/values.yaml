# Default values for the sheep-dog umbrella chart.
# Override per environment via helm-values/values-<env>.yaml and with --set.

# Image coordinates. One block per service so individual mvn builds can override
# just their own image tag via --set images.<svc>.tag=<version>.
images:
  amq:
    repository: apache/activemq-artemis
    tag: "2.41.0"
    pullPolicy: IfNotPresent
  umlApi:
    repository: nexus-docker.sheepdog.io/sheep-dog-uml-api-svc
    tag: "1.47"
    pullPolicy: Always
  cucumberGen:
    repository: nexus-docker.sheepdog.io/sheep-dog-cucumber-gen-svc
    tag: "1.52"
    pullPolicy: Always
  graphmlApi:
    repository: nexus-docker.sheepdog.io/sheep-dog-graphml-api-svc
    tag: "1.38"
    pullPolicy: Always
  mcp:
    repository: nexus-docker.sheepdog.io/sheep-dog-mcp-svc
    tag: "1.46"
    pullPolicy: Always
  mbtSvc:
    repository: nexus-docker.sheepdog.io/sheep-dog-mbt-svc
    tag: "1.31"
    pullPolicy: Always

# Ingress host for the sheep-dog ingress.
# Set on dev/qa (local minikube with hosts file entries). Leave empty on prod
# (AWS EKS) so the ingress matches any host header — the workflow talks directly
# to the AWS ELB hostname, not prod.sheepdog.io.
ingress:
  host: ""

# PVC storage class applied to all PVCs (uml-api logs, cucumber-gen logs,
# shared repo). "standard" for minikube, "gp2" for AWS EKS.
pvcStorageClass: standard

# Per-service enable toggles (#456). Flip a service off in a values-<ns>.yaml to
# scale the stack down for a memory-constrained namespace (e.g. dev on the 8 GB
# sandbox node). Defaults are all-on so existing deploys are unchanged.
#
# Dependency closure — enabling a service requires its deps to be enabled too:
#   graphmlApi / umlApi  -> (amq + repo, both derived below)
#   cucumberGen               -> umlApi (+ amq + repo)
#   mcp                       -> umlApi + cucumberGen (+ amq; mcp needs no repo)
#   graphmlApi                -> mbtSvc (graphml-to-graphwalker, #475)
# amq and the shared repo PVC are NOT toggled directly: they render iff any of
# umlApi/cucumberGen/graphmlApi is enabled. sheep-dog-mbt-svc has its own
# mbtSvc.enabled flag (its own failsafe deploys just itself) but ALSO renders
# whenever graphmlApi is enabled, since graphml-to-graphwalker consumes it.

# PVC sizes + enable flag per component
umlApi:
  enabled: true
  pvcSize: 1Gi
cucumberGen:
  enabled: true
  pvcSize: 1Gi
graphmlApi:
  enabled: true
  pvcSize: 1Gi
  # graphml-api-svc pushes the graphml model to git (sheep-dog-main#503), via an
  # out-of-band GitHub token Secret — only the name/key live here.
  githubSecretName: graphwalker-github
  githubSecretKey: token
mcp:
  enabled: true
# Permanent MBT path/model wrapper service (sheep-dog-main#462/#502/#534).
# graphml-to-graphwalker reaches it in-cluster at http://sheep-dog-mbt-svc:80; the
# d3.js viewer (#497) and the mbt-svc failsafe ITs reach it via the sheep-dog
# ingress (/paths, /models). No git token any more — the model lives only in the
# service's memory (#534).
mbtSvc:
  enabled: true
# Shared repo volume mounted by both uml-api-svc and cucumber-gen-svc
# at /repo. Bridges the cross-service file-store dependency previously served
# by the shared MySQL DB (#388). RWO works on single-node minikube because
# both pods land on the same node; multi-node will need RWX.
repo:
  pvcSize: 1Gi
