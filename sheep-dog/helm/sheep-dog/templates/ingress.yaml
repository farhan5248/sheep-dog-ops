apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sheep-dog-ingress
  labels:
    app: sheep-dog
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    -
      {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host | quote }}
      {{- end }}
      http:
        paths:
          {{- if .Values.asciidocApi.enabled }}
          - path: /asciidoctor
            pathType: Prefix
            backend:
              service:
                name: sheep-dog-asciidoc-api-svc
                port:
                  number: 80
          - path: /uml
            pathType: Prefix
            backend:
              service:
                name: sheep-dog-asciidoc-api-svc
                port:
                  number: 80
          - path: /sheep-dog-asciidoc-api-svc/actuator
            pathType: Prefix
            backend:
              service:
                name: sheep-dog-asciidoc-api-svc
                port:
                  number: 80
          {{- end }}
          {{- if .Values.cucumberGen.enabled }}
          - path: /cucumber
            pathType: Prefix
            backend:
              service:
                name: sheep-dog-cucumber-gen-svc
                port:
                  number: 80
          - path: /sheep-dog-cucumber-gen-svc/actuator
            pathType: Prefix
            backend:
              service:
                name: sheep-dog-cucumber-gen-svc
                port:
                  number: 80
          {{- end }}
          {{- if .Values.graphmlApi.enabled }}
          - path: /graphmlmodel
            pathType: Prefix
            backend:
              service:
                name: sheep-dog-graphml-api-svc
                port:
                  number: 80
          - path: /graphml
            pathType: Prefix
            backend:
              service:
                name: sheep-dog-graphml-api-svc
                port:
                  number: 80
          - path: /sheep-dog-graphml-api-svc/actuator
            pathType: Prefix
            backend:
              service:
                name: sheep-dog-graphml-api-svc
                port:
                  number: 80
          {{- end }}
          {{- if .Values.mcp.enabled }}
          - path: /\.well-known
            pathType: ImplementationSpecific
            backend:
              service:
                name: sheep-dog-mcp-svc
                port:
                  number: 80
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: sheep-dog-mcp-svc
                port:
                  number: 80
          {{- end }}
    {{- if and .Values.graphwalkerUi.enabled .Values.graphwalkerUi.host }}
    -
      host: {{ .Values.graphwalkerUi.host | quote }}
      http:
        paths:
          # GraphWalker Studio SPA loads assets from root, so it gets its own
          # host (studio.sheepdog.io) serving "/" rather than a path prefix (#454).
          - path: /
            pathType: Prefix
            backend:
              service:
                name: graphwalker-ui
                port:
                  number: 80
    {{- end }}
