{{- if or .Values.mbtSvc.enabled .Values.graphmlApi.enabled }}
apiVersion: v1
kind: Service
# In-cluster DNS name graphml-api-svc reaches at http://sheep-dog-mbt-svc:80 (#534).
metadata:
  name: sheep-dog-mbt-svc
  labels:
    app: sheep-dog
    component: sheep-dog-mbt-svc
spec:
  selector:
    component: sheep-dog-mbt-svc
  ports:
    - name: sheep-dog-mbt-svc
      port: 80
      targetPort: 8080
  type: ClusterIP
{{- end }}
