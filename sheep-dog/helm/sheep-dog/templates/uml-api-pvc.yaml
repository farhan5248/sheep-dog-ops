{{- if .Values.umlApi.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sheep-dog-uml-api-svc-pvc
  labels:
    app: sheep-dog
    component: sheep-dog-uml-api-svc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.pvcStorageClass | quote }}
  resources:
    requests:
      storage: {{ .Values.umlApi.pvcSize | quote }}
{{- end }}
