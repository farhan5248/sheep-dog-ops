apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sheep-dog-asciidoc-api-svc-pvc
  labels:
    app: sheep-dog
    component: sheep-dog-asciidoc-api-svc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.pvcStorageClass | quote }}
  resources:
    requests:
      storage: {{ .Values.asciidocApi.pvcSize | quote }}
