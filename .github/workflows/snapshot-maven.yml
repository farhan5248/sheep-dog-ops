name: Maven Snapshot

on:
  workflow_call:
    inputs:
      project:
        description: 'Project'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      project:
        description: 'Project'
        required: true
        type: choice
        options:
          - darmok-maven-plugin
          - sheep-dog-asciidoc-api
          - sheep-dog-cucumber-gen
          - sheep-dog-grammar
          - sheep-dog-mgmt-maven-plugin
          - sheep-dog-svc-maven-plugin
          - sheepdogasciidoc.parent
          - sheepdogcucumber.parent
          - sheepdogeclipseplugin.parent
          - sheep-dog-vscode-plugin
jobs:
  build:
    runs-on: [farhan5248-runners]
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      run: echo "JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64" >> $GITHUB_ENV
    - name: Helm registry login (Nexus OCI)
      run: |
        for i in 1 2 3 4 5; do
          if echo "${{ secrets.NEXUS_PASSWORD }}" | timeout 30 helm registry login nexus-docker.sheepdog.io \
               --username "${{ secrets.NEXUS_USER }}" \
               --password-stdin; then
            echo "Login succeeded on attempt $i"
            exit 0
          fi
          echo "Attempt $i failed"
          [ $i -lt 5 ] && sleep 10
        done
        echo "All attempts failed"; exit 1
    - name: Run Maven
      working-directory: ./${{ inputs.project }}
      run: |
        mvn -U deploy
      env:
        GITHUB_TOKEN: ${{ github.token }}
