name: Maven Snapshot

on:
  workflow_call:
    inputs:
      project:
        description: 'Project'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      project:
        description: 'Project'
        required: true
        type: choice
        options:
          - sheep-dog-asciidoc-api
          - sheep-dog-cucumber-gen
          - sheep-dog-grammar
          - sheep-dog-mgmt-maven-plugin
          - sheepdogasciidoc.parent
          - sheepdogcucumber.parent
          - sheepdogeclipseplugin.parent
          - sheep-dog-vscode-plugin
jobs:
  build:
    runs-on: [farhan5248-runners]
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      run: echo "JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64" >> $GITHUB_ENV
    - name: Run Maven
      working-directory: ./${{ inputs.project }}
      run: |
        mvn -U deploy
      env:
        GITHUB_TOKEN: ${{ github.token }}
