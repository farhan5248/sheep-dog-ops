name: Teardown Namespace

on:
  workflow_call:
    inputs:
      namespace:
        description: 'Kubernetes namespace (also used as EKS stack suffix)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Kubernetes namespace (also used as EKS stack suffix)'
        required: true
        default: 'prod'

jobs:
  teardown-k8s:
    runs-on: [self-hosted, farhan5248-runners, linux]

    steps:
      - name: Checkout sheep-dog-ops
        uses: actions/checkout@v4
        with:
          repository: farhan5248/sheep-dog-ops

      - name: Run teardown-namespace.sh
        run: bash sheep-dog/scripts/teardown-namespace.sh "${{ inputs.namespace }}"
