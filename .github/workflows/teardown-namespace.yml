name: Teardown Namespace

on:
  workflow_call:
    inputs:
      namespace:
        description: 'Kubernetes namespace (also used as EKS stack suffix)'
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Kubernetes namespace (also used as EKS stack suffix)'
        required: true
        default: 'prod'

jobs:
  teardown-k8s:
    # Self-hosted runner to stay consistent with setup-namespace.yml.
    runs-on: [self-hosted, farhan5248-runners, linux]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Cluster-connect delegated to eks/select-cluster.sh. Fails loud if
      # the CloudFormation stack is missing — teardown is meaningful only
      # against an existing cluster, so silent no-op tolerance is explicitly
      # not wanted here.
      - name: Select cluster
        run: bash eks/select-cluster.sh "${{ inputs.namespace }}"

      - name: Run teardown-namespace.sh
        run: bash sheep-dog/scripts/teardown-namespace.sh "${{ inputs.namespace }}"

      - name: Teardown completed
        run: echo "Teardown completed successfully!"
