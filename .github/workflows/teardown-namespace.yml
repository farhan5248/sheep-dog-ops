name: Teardown Namespace

on:
  workflow_call:
    inputs:
      namespace:
        description: 'Kubernetes namespace (also used as EKS stack suffix)'
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Kubernetes namespace (also used as EKS stack suffix)'
        required: true
        default: 'prod'

jobs:
  teardown-k8s:
    runs-on: [self-hosted, farhan5248-runners, linux]

    steps:
      - name: Checkout sheep-dog-ops
        uses: actions/checkout@v4
        with:
          repository: farhan5248/sheep-dog-ops

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Run teardown-namespace.sh
        run: bash sheep-dog/scripts/teardown-namespace.sh "${{ inputs.namespace }}"
