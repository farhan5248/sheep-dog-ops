name: Smoke Test

on:
  workflow_call:
    inputs:
      host:
        description: 'Host parameter for Maven'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      host:
        description: 'Host parameter for Maven'
        required: true
        default: 'localhost'

jobs:
  smoke-test:
    runs-on: [farhan5248-runners]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout sheep-dog-ops
        uses: actions/checkout@v4
        with:
          path: sheep-dog-ops
      - name: Checkout sheep-dog-specs
        uses: actions/checkout@v4
        with:
          repository: farhan5248/sheep-dog-specs
          path: sheep-dog-specs
      - name: Set up JDK 21
        run: echo "JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64" >> $GITHUB_ENV
      - name: Smoke test
        # Both repos are checked out as siblings under $GITHUB_WORKSPACE, so
        # smoke-test.sh's default relative path to sheep-dog-features resolves
        # correctly without needing the optional features-dir arg.
        run: bash sheep-dog-ops/sheep-dog/scripts/smoke-test.sh "${{ inputs.host }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}
