name: Maven Release

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      project:
        description: 'Project'
        required: true
        type: choice
        options:
          - darmok-maven-plugin
          - sheep-dog-asciidoc-api
          - sheep-dog-asciidoc-api-svc
          - sheep-dog-cucumber-gen
          - sheep-dog-cucumber-gen-svc
          - sheep-dog-mcp-svc
          - sheep-dog-svc-maven-plugin
          - sheep-dog-grammar
          - sheep-dog-mgmt-maven-plugin
          - sheepdogasciidoc.parent
          - sheepdogcucumber.parent
          - sheepdogeclipseplugin.parent
jobs:
  build:
    runs-on: [farhan5248-runners]
    permissions:
      contents: write
      packages: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        overwrite-settings: false
    - name: Set up Git
      run: |
        git config --local user.name "${{ vars.ACTIONS_BOT_NAME }}"
        git config --local user.email "${{ vars.ACTIONS_BOT_EMAIL }}"
    - name: Release
      working-directory: ./${{ inputs.project }}
      run: mvn org.farhan:sheep-dog-mgmt-maven-plugin:release
      env:
        GITHUB_TOKEN: ${{ github.token }}
