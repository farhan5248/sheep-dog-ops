name: Maven Release

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      preparation_goals:
        description: 'Goals passed to the inner mvn deploy invocation. Comma-separated. Services override to deploy=qa; chart uses default.'
        required: false
        type: string
        default: 'deploy,-DskipTests'
  workflow_dispatch:
    inputs:
      project:
        description: 'Project'
        required: true
        type: choice
        options:
          - darmok-maven-plugin
          - sheep-dog-asciidoc-api
          - sheep-dog-asciidoc-api-svc
          - sheep-dog-cucumber-gen
          - sheep-dog-cucumber-gen-svc
          - sheep-dog-mcp-svc
          - sheep-dog-svc-maven-plugin
          - sheep-dog-grammar
          - sheep-dog-mgmt-maven-plugin
          - sheep-dog
          - sheepdogasciidoc.parent
          - sheepdogcucumber.parent
          - sheepdogeclipseplugin.parent
          - sheep-dog-vscode-plugin
      preparation_goals:
        description: 'Goals passed to the inner mvn deploy invocation. Comma-separated.'
        required: false
        type: string
        default: 'deploy,-DskipTests'
jobs:
  build:
    runs-on: [farhan5248-runners]
    permissions:
      contents: write
      packages: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      run: echo "JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64" >> $GITHUB_ENV
    - name: Helm registry login (Nexus OCI)
      run: |
        for i in 1 2 3 4 5; do
          if echo "${{ secrets.NEXUS_PASSWORD }}" | timeout 30 helm registry login nexus-docker.sheepdog.io \
               --username "${{ secrets.NEXUS_USER }}" \
               --password-stdin; then
            echo "Login succeeded on attempt $i"
            exit 0
          fi
          echo "Attempt $i failed"
          [ $i -lt 5 ] && sleep 10
        done
        echo "All attempts failed"; exit 1
    - name: Set up Git
      run: |
        git config --local user.name "${{ vars.ACTIONS_BOT_NAME }}"
        git config --local user.email "${{ vars.ACTIONS_BOT_EMAIL }}"
    - name: Release
      working-directory: ./${{ inputs.project }}
      run: mvn org.farhan:sheep-dog-mgmt-maven-plugin:release "-DpreparationGoals=${{ inputs.preparation_goals }}"
      env:
        GITHUB_TOKEN: ${{ github.token }}
