name: Maven Release

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      project:
        description: 'Project'
        required: true
        type: choice
        options:
          - darmok-maven-plugin
          - sheep-dog-asciidoc-api
          - sheep-dog-asciidoc-api-svc
          - sheep-dog-cucumber-gen
          - sheep-dog-cucumber-gen-svc
          - sheep-dog-mcp-svc
          - sheep-dog-svc-maven-plugin
          - sheep-dog-grammar
          - sheep-dog-mgmt-maven-plugin
          - sheepdogasciidoc.parent
          - sheepdogcucumber.parent
          - sheepdogeclipseplugin.parent
jobs:
  build:
    runs-on: [farhan5248-runners]
    permissions:
      contents: write
      packages: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        overwrite-settings: false
    - name: Set up Git
      run: |
        git config --local user.name "${{ vars.ACTIONS_BOT_NAME }}"
        git config --local user.email "${{ vars.ACTIONS_BOT_EMAIL }}"
    - name: Publish Release version
      working-directory: ./${{ inputs.project }}
      run: |
        git reset --hard HEAD
        git clean -fdx
        git pull
        mvn org.codehaus.mojo:versions-maven-plugin:update-properties -DallowSnapshots=false -DallowDowngrade=true
        mvn org.farhan:sheep-dog-mgmt-maven-plugin:prepare -DpreparationGoals=deploy,-DskipTests
        git push
        git push --tags
      env:
        GITHUB_TOKEN: ${{ github.token }}
    - name: Publish SNAPSHOT version
      working-directory: ./${{ inputs.project }}
      run: |
        mvn org.codehaus.mojo:versions-maven-plugin:update-properties -DallowSnapshots=true
        git clean -fdx
        if [[ $(git status --porcelain --untracked-files=no | wc -l) -gt 0 ]]; then
          git add *
          git commit -m "Upgrading dependency versions"
          git push
        fi
        mvn clean deploy -DskipTests
      env:
        GITHUB_TOKEN: ${{ github.token }}
