name: Setup Cluster

on:
  workflow_call:
    inputs:
      namespace:
        description: 'Kubernetes namespace (also used as EKS stack suffix)'
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_ACCOUNT_ID:
        required: true
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Kubernetes namespace (also used as EKS stack suffix)'
        required: true
        default: 'prod'

jobs:
  setup-cluster:
    # Self-hosted runner for LAN access to nexus-docker.sheepdog.io and to
    # match the namespace workflows (single runner profile across the
    # cluster-lifecycle + namespace chain).
    runs-on: [self-hosted, farhan5248-runners, linux]
    env:
      ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # The cluster-lifecycle work (CloudFormation deploy, OIDC provider, EBS
      # CSI role, ingress-nginx install, polling loops) is delegated to the
      # distribution-agnostic script so local Linux runs and CI share the
      # same code path. The checkout + AWS login steps above are CI-only and
      # stay in the workflow.
      - name: Run eks/setup-cluster.sh
        run: bash eks/setup-cluster.sh "${{ inputs.namespace }}"
