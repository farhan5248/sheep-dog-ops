name: Teardown Cluster

on:
  workflow_call:
    inputs:
      namespace:
        description: 'Kubernetes namespace (also used as EKS stack suffix)'
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_ACCOUNT_ID:
        required: true
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Kubernetes namespace (also used as EKS stack suffix)'
        required: true
        default: 'prod'

jobs:
  teardown-cluster:
    # Self-hosted to match setup-cluster.yml and the namespace workflows.
    runs-on: [self-hosted, farhan5248-runners, linux]
    env:
      ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # ingress-nginx deletion, LB drain wait, EBS CSI IAM role + OIDC
      # provider cleanup, and CloudFormation stack delete are all delegated
      # to the distribution-agnostic script so local Linux runs and CI
      # share the same code path.
      - name: Run eks/teardown-cluster.sh
        run: bash eks/teardown-cluster.sh "${{ inputs.namespace }}"
