name: Teardown Cluster

on:
  workflow_call:
    inputs:
      suffix:
        description: 'Suffix for the stack name'
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
  workflow_dispatch:
    inputs:
      suffix:
        description: 'Suffix for the stack name'
        required: true
        default: '1'

jobs:
  teardown-k8s:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sheep-dog
    env:
      BASE_STACK_NAME: sheep-dog-aws
      REGION: us-east-1
      NAMESPACE: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Set stack name
        id: stack
        run: |
          echo "STACK_NAME=${BASE_STACK_NAME}-${{ inputs.suffix }}" >> $GITHUB_ENV

      - name: Get EKS cluster name
        id: cluster
        run: |
          CLUSTER_NAME=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='ClusterName'].OutputValue" \
            --output text \
            --region $REGION)
          echo "CLUSTER_NAME=$CLUSTER_NAME" >> $GITHUB_ENV

      - name: Update kubeconfig (if cluster exists)
        if: env.CLUSTER_NAME != ''
        run: |
          aws eks update-kubeconfig --name "$CLUSTER_NAME" --region $REGION

      - name: Delete ingress-nginx namespace (releases the NLB)
        if: env.CLUSTER_NAME != ''
        run: |
          kubectl delete namespace ingress-nginx --ignore-not-found=true --timeout=300s

      - name: Wait for cluster load balancers to be deleted
        if: env.CLUSTER_NAME != ''
        run: |
          for i in {1..30}; do
            LB_COUNT=$(aws resourcegroupstaggingapi get-resources \
              --resource-type-filters elasticloadbalancing:loadbalancer \
              --tag-filters "Key=kubernetes.io/cluster/$CLUSTER_NAME,Values=owned" \
              --query "length(ResourceTagMappingList)" \
              --output text \
              --region $REGION)
            if [ "$LB_COUNT" = "0" ]; then
              echo "All cluster load balancers deleted."
              exit 0
            fi
            echo "Waiting for $LB_COUNT load balancer(s)... (attempt $i/30)"
            sleep 10
          done
          echo "ERROR: Timed out waiting for load balancers to be deleted."
          exit 1

      - name: Delete Kubernetes app resources (if cluster exists)
        if: env.CLUSTER_NAME != ''
        run: |
          kubectl delete -k kubernetes/complete/overlays/$NAMESPACE/ --ignore-not-found=true

      - name: Teardown completed
        run: echo "Teardown completed successfully!"