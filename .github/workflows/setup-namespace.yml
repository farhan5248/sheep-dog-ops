name: Setup Namespace

on:
  workflow_call:
    inputs:
      namespace:
        description: 'Kubernetes namespace (also used as EKS stack suffix)'
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
    outputs:
      service_url:
        description: "The service URL"
        value: ${{ jobs.setup-k8s.outputs.service_url }}
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Kubernetes namespace (also used as EKS stack suffix)'
        required: true
        default: 'prod'

jobs:
  setup-k8s:
    # Self-hosted runner required for LAN access to nexus-docker.sheepdog.io
    # where the helm chart is hosted. Cloud runners can't reach the LAN
    # Nexus until #218 (Let's Encrypt + public Nexus) lands.
    runs-on: [self-hosted, farhan5248-runners, linux]
    env:
      BASE_STACK_NAME: sheep-dog-aws
      REGION: us-east-1
      NAMESPACE: ${{ inputs.namespace }}
    outputs:
      service_url: ${{ steps.setup_namespace.outputs.service_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Get EKS Cluster Name from CloudFormation
        run: |
          STACK_NAME="${BASE_STACK_NAME}-${{ inputs.namespace }}"
          CLUSTER_NAME=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='ClusterName'].OutputValue" \
            --output text \
            --region $REGION)
          echo "CLUSTER_NAME=$CLUSTER_NAME" >> $GITHUB_ENV

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name "$CLUSTER_NAME" --region $REGION

      # The helm work is delegated to the distribution-agnostic script so
      # local runs and CI share the same code path. The EKS-connect steps
      # above are CI-only and stay in the workflow.
      - name: Run setup-namespace.sh
        id: setup_namespace
        run: bash sheep-dog/scripts/setup-namespace.sh "$NAMESPACE"
