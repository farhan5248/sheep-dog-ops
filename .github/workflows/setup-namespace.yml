name: Setup Namespace

on:
  workflow_call:
    inputs:
      namespace:
        description: 'Kubernetes namespace (also used as EKS stack suffix)'
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
    outputs:
      service_url:
        description: "The service URL"
        value: ${{ jobs.setup-k8s.outputs.service_url }}
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Kubernetes namespace (also used as EKS stack suffix)'
        required: true
        default: 'prod'

jobs:
  setup-k8s:
    # Self-hosted runner required for LAN access to nexus-docker.sheepdog.io
    # where the helm chart is hosted. Cloud runners can't reach the LAN
    # Nexus until #218 (Let's Encrypt + public Nexus) lands.
    runs-on: [self-hosted, farhan5248-runners, linux]
    outputs:
      service_url: ${{ steps.setup_namespace.outputs.service_url }}

    steps:
      - name: Checkout sheep-dog-ops
        uses: actions/checkout@v4
        with:
          repository: farhan5248/sheep-dog-ops

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Select EKS cluster
        run: |
          STACK_NAME="sheep-dog-aws-${{ inputs.namespace }}"
          CLUSTER_NAME=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --query "Stacks[0].Outputs[?OutputKey=='ClusterName'].OutputValue" \
              --output text \
              --region us-east-1)
          if [[ -z "$CLUSTER_NAME" ]]; then
              echo "Failed to get EKS cluster name from stack $STACK_NAME."
              exit 1
          fi
          aws eks update-kubeconfig --name "$CLUSTER_NAME" --region us-east-1

      - name: Run setup-namespace.sh
        id: setup_namespace
        run: bash sheep-dog/scripts/setup-namespace.sh "${{ inputs.namespace }}"
