name: Deploy

on:
  workflow_call:
    inputs:
      namespace:
        required: true
        type: string
      project:
        description: 'Project'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Kubernetes namespace'
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      project:
        description: 'Project'
        required: true
        type: choice
        options:
          - sheep-dog-asciidoc-api-svc
          - sheep-dog-cucumber-gen-svc
          - sheep-dog-dev-mcp
jobs:
  build:
    runs-on: [farhan5248-runners, linux]
    permissions:
      contents: read
      packages: read
    steps:
    - uses: actions/checkout@v4
    - name: Deploy to Kubernetes
      working-directory: ./${{ inputs.project }}
      run: |
          kubectl apply -k docker/overlays/${{ inputs.namespace }}
