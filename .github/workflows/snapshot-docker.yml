name: Snapshot Docker

on:
  workflow_call:
    inputs:
      project:
        description: 'Project'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      project:
        description: 'Project'
        required: true
        type: choice
        options:
          - sheep-dog-asciidoc-api-svc
          - sheep-dog-cucumber-gen-svc
          - sheep-dog-mcp-svc
jobs:
  build:
    runs-on: [farhan5248-runners]
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up JDK 21
      run: echo "JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64" >> $GITHUB_ENV
    - name: Helm registry login (Nexus OCI)
      run: |
        for i in 1 2 3 4 5; do
          if echo "${{ secrets.NEXUS_PASSWORD }}" | timeout 30 helm registry login nexus-docker.sheepdog.io \
               --username "${{ secrets.NEXUS_USER }}" \
               --password-stdin; then
            echo "Login succeeded on attempt $i"
            exit 0
          fi
          echo "Attempt $i failed"
          [ $i -lt 5 ] && sleep 10
        done
        echo "All attempts failed"; exit 1
    - name: Run Maven
      working-directory: ./${{ inputs.project }}
      run: |
        mvn -U install "-Dsheepdog.namespace=dev"
      env:
        GITHUB_TOKEN: ${{ github.token }}
        MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
    - name: Deploy stubs jar
      working-directory: ./${{ inputs.project }}
      run: |
        if ls target/*-stubs.jar 1> /dev/null 2>&1; then
          mvn deploy:deploy-file \
            -DpomFile=pom.xml \
            -Dfile=$(ls target/*-stubs.jar) \
            -Dclassifier=stubs \
            -Dpackaging=jar \
            -DrepositoryId=nexus-snapshots \
            -Durl=https://nexus.sheepdog.io/repository/maven-snapshots/
        else
          echo "No stubs jar — skipping"
        fi
      env:
        GITHUB_TOKEN: ${{ github.token }}