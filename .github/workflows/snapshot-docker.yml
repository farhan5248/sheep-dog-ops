name: Snapshot Docker

on:
  workflow_call:
    inputs:
      project:
        description: 'Project'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      project:
        description: 'Project'
        required: true
        type: choice
        options:
          - darmok-maven-plugin
          - sheep-dog-mcp-svc
          - sheep-dog-asciidoc-api-svc
          - sheep-dog-cucumber-gen-svc
          - sheep-dog-svc-maven-plugin
jobs:
  build:
    runs-on: [farhan5248-runners]
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up JDK 21
      run: echo "JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64" >> $GITHUB_ENV
    - name: Select minikube cluster
      # The runner's kubectl context may be pointing elsewhere from a prior
      # workflow run (e.g. EKS from Phase 2 setup-namespace). jkube uses the
      # current context for image push + deploy, so explicitly re-select
      # minikube before any mvn docker work.
      run: bash minikube/select-cluster.sh dev
    - name: Run Maven
      working-directory: ./${{ inputs.project }}
      run: |
        mvn -U deploy "-Dsheepdog.namespace=dev"
      env:
        GITHUB_TOKEN: ${{ github.token }}
        MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}