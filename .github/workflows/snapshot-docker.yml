name: Snapshot Docker

on:
  workflow_call:
    inputs:
      project:
        description: 'Project'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      project:
        description: 'Project'
        required: true
        type: choice
        options:
          - darmok-maven-plugin
          - sheep-dog-mcp-svc
          - sheep-dog-asciidoc-api-svc
          - sheep-dog-cucumber-gen-svc
          - sheep-dog-svc-maven-plugin
jobs:
  build:
    runs-on: [farhan5248-runners]
    permissions:
      contents: read
      packages: write
    steps:
    # Checkout the calling repo (sheep-dog-svc) into a subdirectory so that
    # sheep-dog-ops can be checked out as a sibling. This matches the local
    # dev machine layout where sheep-dog-main hosts both as submodules,
    # allowing the service pom's relative path to the helm chart to resolve.
    # TODO: remove the sheep-dog-ops checkout once the umbrella helm chart
    # is hosted in Nexus (see #82) and the service poms pull by version.
    - name: Checkout calling repo
      uses: actions/checkout@v4
      with:
        path: sheep-dog-svc
    - name: Checkout sheep-dog-ops (for helm chart)
      uses: actions/checkout@v4
      with:
        repository: farhan5248/sheep-dog-ops
        path: sheep-dog-ops
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        overwrite-settings: false
    - name: Run Maven
      working-directory: ./sheep-dog-svc/${{ inputs.project }}
      run: |
        mvn -U deploy "-Dsheepdog.namespace=dev"
      env:
        GITHUB_TOKEN: ${{ github.token }}
        MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}