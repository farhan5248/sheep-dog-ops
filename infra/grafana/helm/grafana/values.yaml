# Step 3b: provisioning loop enabled — sidecar watches ConfigMaps with
# `grafana_dashboard` / `grafana_datasource` labels and hot-loads them.
# Still no plugins. Infinity + KensoBI land in 3d / 3e.

grafana:
  service:
    type: ClusterIP

  # Host-based ingress so the dashboard is reachable at http://grafana.sheepdog.io
  # without kubectl port-forward. Requires `minikube tunnel` and a hosts-file
  # entry `127.0.0.1 grafana.sheepdog.io` (same pattern as nexus.sheepdog.io).
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.sheepdog.io

  persistence:
    enabled: false

  # Sidecar provisioning — picks up any ConfigMap in the release namespace
  # carrying the right label. Our chart contributes one of each as a smoke test;
  # later steps add real datasources (3d) and dashboards (3e) via the same path.
  sidecar:
    datasources:
      enabled: true
      label: grafana_datasource
      labelValue: "1"
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      folder: /tmp/dashboards
      provider:
        foldersFromFilesStructure: true

  # Step 3c: mount the Darmok metrics hostPath PVC read-only so Infinity (3d) can read
  # /var/lib/grafana/darmok-metrics/metrics.csv. Host-side dir is
  # C:\Users\Farhan\minikube-data\darmok-metrics on windows-minipc, bridged via
  # minikube start --mount-string (see sheep-dog-ops/infra/minikube/setup-cluster-local.bat).
  # Chart uses its own `existingClaim` shorthand, not the standard
  # persistentVolumeClaim.claimName shape.
  extraVolumes:
    - name: darmok-metrics
      existingClaim: darmok-metrics-pvc
  extraVolumeMounts:
    - name: darmok-metrics
      mountPath: /var/lib/grafana/darmok-metrics
      readOnly: true

  # Step 3d: Infinity datasource plugin. Reads CSV/JSON/XML/etc. via URL;
  # does NOT support file:// schemes, so the nginx sidecar (below) serves
  # the hostPath-mounted CSV over http://localhost inside the pod.
  plugins:
    - yesoreyeram-infinity-datasource
    - kensobi-spc-panel

  # Sidecar that serves darmok-metrics/ over HTTP for Infinity to consume.
  # Same pod, same PVC mount (read-only), localhost networking only. busybox
  # httpd is used because it takes the port as a command arg (no conf file
  # needed) and runs as any UID — matches the chart's runAsNonRoot=true.
  # Port 8888 avoids conflict with the kiwigrid sidecar health endpoint on 8080.
  extraContainers: |
    - name: csv-server
      image: busybox:1.37
      command: ["httpd", "-f", "-p", "8888", "-h", "/data"]
      ports:
        - name: csv-http
          containerPort: 8888
      volumeMounts:
        - name: darmok-metrics
          mountPath: /data
          readOnly: true
      resources:
        requests: { cpu: 10m, memory: 8Mi }
        limits:   { cpu: 50m, memory: 32Mi }
