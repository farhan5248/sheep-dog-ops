# Values for the standalone GraphWalker product chart.
# Deploys to the `graphwalker` namespace on minikube-team (context minikube-graphwalker).
# Single environment for now; add helm-values/values-<env>.yaml later if needed.

# Image coordinates. Built/pushed by the modules in the graphwalker repo.
images:
  graphwalkerUi:
    repository: nexus-docker.sheepdog.io/graphwalker-ui
    tag: "4.3.3"
    pullPolicy: Always
  graphwalkerSvc:
    repository: nexus-docker.sheepdog.io/graphwalker-svc
    tag: "1.0-SNAPSHOT"
    pullPolicy: Always

# GraphWalker Studio web model editor. Retired from the cluster — Studio runs
# locally on demand via the graphwalker repo's scripts/run-studio-local.sh, so it
# no longer needs to run permanently in this namespace (sheep-dog-main#494).
# Disabled here removes the ui Deployment, Service, and its ingress route; flip
# back to true to serve it over the LAN again. host is kept for that case.
graphwalkerUi:
  enabled: false
  host: studio.graphwalker.io

# Path-generation REST service (sheep-dog-main#462). Synchronous REST over
# GraphWalker offline; serves the api.graphwalker.io ingress route.
graphwalkerSvc:
  enabled: true
  host: api.graphwalker.io
  # Kubernetes Secret holding the GitHub token used to read coverage models from
  # the private specs repo (sheep-dog-main#470). Create it on the cluster with:
  #   kubectl create secret generic graphwalker-github -n graphwalker \
  #     --from-literal=token=<fine-grained-PAT>
  # Only the name/key are in git; the token value lives only in cluster etcd.
  githubSecretName: graphwalker-github
  githubSecretKey: token
