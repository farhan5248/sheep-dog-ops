apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: graphwalker-ingress
  labels:
    app: graphwalker
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    {{- if and .Values.graphwalkerUi.enabled .Values.graphwalkerUi.host }}
    # GraphWalker Studio SPA loads assets from root, so it gets its own host.
    - host: {{ .Values.graphwalkerUi.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: graphwalker-ui
                port:
                  number: 80
    {{- end }}
    {{- if and .Values.graphwalkerSvc.enabled .Values.graphwalkerSvc.host }}
    # Path-generation REST API (sheep-dog-main#462) — renders once the service is enabled.
    - host: {{ .Values.graphwalkerSvc.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: graphwalker-svc
                port:
                  number: 80
    {{- end }}
